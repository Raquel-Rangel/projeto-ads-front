

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSolutions - Fale Conosco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TechSolutions - Fale Conosco</h1>
    </header>
    <main>
        <form id="contact-form" action="#" method="Post"> 
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required minlength="3">
            <label for="email">E-mail:</label>
            <input type="email" id="email" required>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone">
            <label for="assunto">Assunto:</label>
            <select id="assunto">
                <option value="Suporte">Suporte</option>
                <option value="Vendas">Vendas</option>
                <option value="Reclamação">Reclamação</option>
                <option value="Outros">Outros</option>
            </select>
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" required minlength="10"></textarea>
            <label for="termos">
                <input type="checkbox" id="termos" required>
                Aceito os termos de privacidade
            </label>
            <button type="submit">Enviar</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 TechSolutions</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
